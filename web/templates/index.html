<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人知识库</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f4f8; color: #2c3e50; }
        .container { display: flex; height: 100vh; }
        .sidebar { width: 280px; background: #fff; border-right: 1px solid #e0e0e0; overflow-y: auto; padding: 24px; flex-shrink: 0; }
        .sidebar h2 { font-size: 20px; margin-bottom: 20px; color: #2c3e50; font-weight: 600; }
        .sidebar ul { list-style: none; }
        .sidebar li { padding: 12px 16px; cursor: pointer; border-radius: 8px; margin-bottom: 6px; transition: all 0.2s; color: #5a6c7d; }
        .sidebar li:hover { background: #f0f4f8; color: #2c3e50; }
        .sidebar li.active { background: #4a90e2; color: #fff; }
        .sidebar .sub-category { padding-left: 28px; font-size: 14px; margin-top: 2px; }
        .sidebar .sub-category.active { background: #e8f0fe; color: #4a90e2; }
        .main { flex: 1; padding: 32px; overflow-y: auto; }
        .search-bar { margin-bottom: 24px; }
        .search-bar input { width: 100%; padding: 14px 18px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 15px; transition: border-color 0.2s; outline: none; }
        .search-bar input:focus { border-color: #4a90e2; }
        .nav-tabs { display: flex; gap: 12px; margin-bottom: 24px; }
        .nav-tabs button { padding: 12px 24px; border: none; background: #fff; cursor: pointer; border-radius: 10px; font-size: 14px; font-weight: 500; transition: all 0.2s; color: #5a6c7d; }
        .nav-tabs button:hover { background: #f0f4f8; }
        .nav-tabs button.active { background: #4a90e2; color: #fff; }
        .card { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border-left: 4px solid #4a90e2; transition: transform 0.2s, box-shadow 0.2s; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.12); }
        .card h3 { font-size: 20px; margin-bottom: 12px; color: #2c3e50; font-weight: 600; }
        .card .meta { font-size: 13px; color: #7f8c8d; margin-bottom: 12px; display: flex; gap: 16px; flex-wrap: wrap; }
        .card .meta span { display: flex; align-items: center; gap: 4px; }
        .card .content { font-size: 15px; line-height: 1.7; color: #5a6c7d; margin-bottom: 12px; }
        .card pre { background: #f6f8fa; padding: 16px; border-radius: 8px; overflow-x: auto; margin: 12px 0; border: 1px solid #e0e0e0; }
        .card pre code { font-family: 'Fira Code', 'Consolas', monospace; font-size: 13px; }
        .tag { display: inline-block; padding: 4px 10px; background: #e8f0fe; border-radius: 6px; font-size: 12px; margin-right: 6px; color: #4a90e2; font-weight: 500; }
        .mastery { display: inline-flex; gap: 2px; }
        .mastery-dot { width: 8px; height: 8px; border-radius: 50%; background: #e0e0e0; }
        .mastery-dot.filled { background: #4a90e2; }
        .test-option:hover { background: #f8f9fa !important; border-color: #4a90e2 !important; }
        .empty { text-align: center; color: #7f8c8d; padding: 80px 20px; font-size: 16px; }
        .loading { text-align: center; padding: 80px 20px; color: #7f8c8d; }
        .loading .spinner { width: 40px; height: 40px; border: 3px solid #e0e0e0; border-top-color: #4a90e2; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-box { text-align: center; padding: 40px 20px; background: #fff; border-radius: 12px; border: 2px solid #f5c6cb; }
        .error-box p { color: #dc3545; margin-bottom: 16px; font-size: 15px; }
        .error-box button { padding: 10px 24px; background: #dc3545; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .content-section { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid #e8f0fe; }
        .content-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .section-title { font-size: 14px; font-weight: 600; color: #4a90e2; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .section-content { font-size: 14px; line-height: 1.7; color: #5a6c7d; }
        .section-content p { margin-bottom: 8px; }
        .section-content p:last-child { margin-bottom: 0; }
        .section-content ul, .section-content ol { margin-left: 20px; margin-bottom: 8px; }
        .section-content li { margin-bottom: 4px; }
        .section-content strong { color: #2c3e50; font-weight: 600; }
        .section-code { background: #f6f8fa; border: 1px solid #e0e0e0; border-radius: 8px; padding: 12px 16px; margin: 8px 0; overflow-x: auto; }
        .section-code code { font-family: 'Fira Code', 'Consolas', monospace; font-size: 13px; color: #2c3e50; }
        .section-table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 13px; }
        .section-table th { background: #e8f0fe; color: #4a90e2; padding: 10px 12px; text-align: left; border: 1px solid #d0e0f8; }
        .section-table td { padding: 8px 12px; border: 1px solid #e0e0e0; color: #5a6c7d; }
        .section-table tr:hover td { background: #f8f9fa; }
        .personal-note { background: #fffbe6; border-left: 3px solid #ffc107; border-radius: 6px; padding: 12px 16px; margin-top: 16px; font-size: 13px; color: #856404; }
        .personal-note-title { font-weight: 600; margin-bottom: 6px; color: #856404; }
        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; height: auto; max-height: 200px; border-right: none; border-bottom: 1px solid #e0e0e0; }
            .main { padding: 16px; }
            .card { padding: 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>知识库</h2>
            <ul id="categories"></ul>
        </div>
        <div class="main">
            <div class="search-bar">
                <input type="text" id="search" placeholder="搜索知识点..." oninput="searchPoints(this.value)">
            </div>
            <div class="nav-tabs">
                <button class="active" onclick="showAll()">浏览</button>
                <button onclick="showFlashcard()">闪卡</button>
                <button onclick="showTest()">测试</button>
            </div>
            <div id="content"></div>
        </div>
    </div>

    <script>
        let currentMode = 'browse';
        let currentCategory = null;
        let currentSubCategory = null;
        let searchTimer = null;

        function safeParseTags(tags) {
            if (!tags) return [];
            try {
                return JSON.parse(tags);
            } catch {
                return [];
            }
        }

        function showLoading() {
            document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner"></div><span>加载中...</span></div>';
        }

        function showError(msg) {
            document.getElementById('content').innerHTML = `<div class="error-box"><p>⚠ ${msg}</p><button onclick="loadPoints()">重试</button></div>`;
        }

        function loadCategories() {
            fetch('/api/categories').then(r => r.json()).then(categories => {
                const ul = document.getElementById('categories');
                ul.innerHTML = '';
                categories.forEach(cat => {
                    const li = document.createElement('li');
                    li.textContent = cat;
                    li.onclick = () => selectCategory(cat);
                    ul.appendChild(li);
                });
            });
        }

        function selectCategory(cat) {
            currentCategory = cat;
            currentSubCategory = null;
            document.querySelectorAll('#categories li').forEach(li => li.classList.remove('active'));
            event.target.classList.add('active');
            loadSubcategories(cat);
            loadPoints();
        }

        function loadSubcategories(cat) {
            fetch(`/api/subcategories?category=${encodeURIComponent(cat)}`).then(r => r.json()).then(subs => {
                const ul = document.getElementById('categories');
                ul.querySelectorAll('.sub-item').forEach(el => el.remove());
                subs.forEach(sub => {
                    const li = document.createElement('li');
                    li.textContent = sub;
                    li.className = 'sub-category sub-item';
                    li.onclick = (e) => { e.stopPropagation(); selectSubCategory(sub); };
                    ul.appendChild(li);
                });
            });
        }

        function selectSubCategory(sub) {
            currentSubCategory = sub;
            document.querySelectorAll('.sub-category').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
            loadPoints();
        }

        function loadPoints() {
            showLoading();
            let url = '/api/points';
            if (currentSubCategory) {
                url += `?category=${encodeURIComponent(currentCategory)}&sub_category=${encodeURIComponent(currentSubCategory)}`;
            } else if (currentCategory) {
                url += `?category=${encodeURIComponent(currentCategory)}`;
            }
            fetch(url).then(r => r.json()).then(points => {
                renderPoints(points);
            }).catch(err => {
                showError('加载失败，请检查网络连接');
            });
        }

        function renderPoints(points) {
            const content = document.getElementById('content');
            if (!points || points.length === 0) {
                content.innerHTML = '<div class="empty">暂无知识点</div>';
                return;
            }
            content.innerHTML = points.map(p => {
                const tags = safeParseTags(p.tags);
                const masteryDots = Array.from({length: 5}, (_, i) =>
                    `<span class="mastery-dot ${i < p.mastery ? 'filled' : ''}"></span>`
                ).join('');
                const personalNote = p.personal_notes ? `
                    <div class="personal-note">
                        <div class="personal-note-title">📝 个人备注</div>
                        <div>${p.personal_notes}</div>
                    </div>
                ` : '';
                return `
                <div class="card">
                    <h3>${p.title}</h3>
                    <div class="meta">
                        <span>📁 ${p.category} / ${p.sub_category}</span>
                        <span>🎯 掌握度: <span class="mastery">${masteryDots}</span></span>
                        ${p.review_count ? `<span>📝 复习${p.review_count}次</span>` : ''}
                    </div>
                    <div class="meta">
                        ${tags.map(t => `<span class="tag">${t}</span>`).join('')}
                    </div>
                    <div id="content-${p.id}" class="content"></div>
                    ${p.code_example ? `<pre><code class="language-python">${escapeHtml(p.code_example)}</code></pre>` : ''}
                    ${personalNote}
                </div>`;
            }).join('');

            // 使用marked解析每个知识点的内容
            points.forEach(p => {
                const contentEl = document.getElementById(`content-${p.id}`);
                if (contentEl && p.content) {
                    contentEl.innerHTML = parseMarkdownContent(p.content);
                }
            });

            document.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
            });
        }

        function parseMarkdownContent(md) {
            if (!md) return '';
            const lines = md.split('\n');
            let html = '';
            let currentSection = null;
            let currentSectionContent = [];
            let inCodeBlock = false;
            let codeBuffer = [];
            let codeLang = '';

            const flushSection = () => {
                if (!currentSection) return '';
                const contentText = currentSectionContent.join('\n').trim();
                if (!contentText) return '';
                let sectionHtml = '';
                if (currentSection === '代码示例') {
                    sectionHtml = `<div class="section-content"><pre class="section-code"><code>${escapeHtml(contentText)}</code></pre></div>`;
                } else {
                    // 检查是否是表格
                    if (contentText.includes('|') && contentText.includes('---')) {
                        const rows = contentText.split('\n').filter(r => r.trim());
                        let tableHtml = '<table class="section-table"><thead>';
                        let inBody = false;
                        rows.forEach((row, idx) => {
                            const cells = row.split('|').filter(c => c.trim());
                            if (row.includes('---')) return;
                            if (!inBody && cells.length > 0 && !row.startsWith('|')) {
                                tableHtml += '<tbody>';
                                inBody = true;
                            }
                            if (cells.length > 0) {
                                if (!inBody) {
                                    tableHtml += `<tr>${cells.map(c => `<th>${c.trim()}</th>`).join('')}</tr>`;
                                } else {
                                    tableHtml += `<tr>${cells.map(c => `<td>${c.trim()}</td>`).join('')}</tr>`;
                                }
                            }
                        });
                        tableHtml += '</tbody></table>';
                        sectionHtml = `<div class="section-content">${tableHtml}</div>`;
                    } else {
                        sectionHtml = `<div class="section-content"><p>${contentText.replace(/\n/g, '<br>')}</p></div>`;
                    }
                }
                return sectionHtml;
            };

            const sectionIcons = {
                '内容摘要': '📋',
                '代码示例': '💻',
                '个人备注': '📝'
            };

            lines.forEach(line => {
                // 跳过 :::code-block::: 占位符（代码块已提取到 code_example 字段）
                if (line.trim() === ':::code-block:::') return;

                const h2Match = line.match(/^## (.+)/);
                const h3Match = line.match(/^### (.+)/);

                if (h2Match) {
                    html += flushSection();
                    currentSection = h2Match[1];
                    currentSectionContent = [];
                } else if (h3Match) {
                    currentSectionContent.push(`<strong>${h3Match[1]}</strong>`);
                } else if (line.startsWith('```')) {
                    if (inCodeBlock) {
                        currentSectionContent.push(codeBuffer.join('\n'));
                        codeBuffer = [];
                        inCodeBlock = false;
                    } else {
                        codeLang = line.slice(3) || 'code';
                        inCodeBlock = true;
                    }
                } else if (inCodeBlock) {
                    codeBuffer.push(line);
                } else if (currentSection) {
                    currentSectionContent.push(line);
                } else {
                    currentSectionContent.push(line);
                }
            });

            html += flushSection();

            // 包装成section块
            if (html) {
                html = `<div class="content-sections">${html}</div>`;
            }

            return html || `<div class="section-content"><p>${escapeHtml(md)}</p></div>`;
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/&/g, '&amp;')
                       .replace(/</g, '&lt;')
                       .replace(/>/g, '&gt;')
                       .replace(/"/g, '&quot;')
                       .replace(/'/g, '&#039;');
        }

        function searchPoints(keyword) {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                if (!keyword) { loadPoints(); return; }
                showLoading();
                fetch(`/api/search?q=${encodeURIComponent(keyword)}`).then(r => r.json()).then(points => {
                    renderPoints(points);
                }).catch(err => {
                    showError('搜索失败，请检查网络连接');
                });
            }, 300);
        }

        function showAll() {
            currentMode = 'browse';
            document.querySelectorAll('.nav-tabs button').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            loadPoints();
        }

        function showFlashcard() {
            currentMode = 'flashcard';
            document.querySelectorAll('.nav-tabs button').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            loadFlashcard();
        }

        let currentFlashcardId = null;

        function loadFlashcard() {
            showLoading();
            fetch('/api/flashcard').then(r => r.json()).then(point => {
                const content = document.getElementById('content');
                if (!point) {
                    content.innerHTML = '<div class="empty">没有可复习的知识点</div>';
                    return;
                }
                currentFlashcardId = point.id;
                content.innerHTML = `
                    <div class="card" style="max-width: 700px; margin: 0 auto;">
                        <h3>${point.title}</h3>
                        <div class="meta">📁 ${point.category} / ${point.sub_category}</div>
                        <div class="content">${point.content}</div>
                        ${point.code_example ? `<pre><code class="language-python">${escapeHtml(point.code_example)}</code></pre>` : ''}
                        <div style="margin-top: 24px; text-align: center; display: flex; gap: 16px; justify-content: center;">
                            <button onclick="flashcardAnswer(true)" style="padding: 12px 32px; background: #28a745; color: #fff; border: none; border-radius: 10px; cursor: pointer; font-size: 15px; font-weight: 500;">✓ 记住了</button>
                            <button onclick="flashcardAnswer(false)" style="padding: 12px 32px; background: #dc3545; color: #fff; border: none; border-radius: 10px; cursor: pointer; font-size: 15px; font-weight: 500;">✗ 没记住</button>
                        </div>
                    </div>
                `;
                document.querySelectorAll('pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });
            }).catch(err => {
                showError('加载失败，请检查网络连接');
            });
        }

        function flashcardAnswer(correct) {
            if (!currentFlashcardId) return;
            fetch('/api/flashcard/answer', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: currentFlashcardId, correct: correct })
            }).then(r => r.json()).then(data => {
                if (data.success) {
                    loadFlashcard();
                }
            });
        }

        function showTest() {
            currentMode = 'test';
            document.querySelectorAll('.nav-tabs button').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            loadTest();
        }

        let currentTestQuestion = null;
        let allOptions = [];
        let answered = false;

        function loadTest() {
            showLoading();
            fetch('/api/test').then(r => r.json()).then(data => {
                const content = document.getElementById('content');
                if (!data || !data.question) {
                    content.innerHTML = '<div class="empty">没有可测试的知识点</div>';
                    return;
                }

                currentTestQuestion = data.question;
                answered = false;

                const correctOption = { id: data.question.id, title: data.question.title };
                allOptions = [correctOption, ...data.options];
                allOptions.sort(() => Math.random() - 0.5);

                const optionsHtml = allOptions.map((opt, idx) => `
                    <div class="test-option" data-id="${opt.id}" onclick="selectOption(${idx})"
                         style="padding: 16px; margin: 12px 0; background: #fff; border: 2px solid #e0e0e0; border-radius: 12px; cursor: pointer; transition: all 0.2s; font-size: 15px;">
                        <span style="font-weight: 600; margin-right: 12px; color: #4a90e2;">${String.fromCharCode(65 + idx)}.</span>
                        ${opt.title}
                    </div>
                `).join('');

                content.innerHTML = `
                    <div class="card" style="max-width: 700px; margin: 0 auto;">
                        <h3>${data.question.title}</h3>
                        <div class="meta" style="margin-bottom: 16px;">📁 ${data.question.category} / ${data.question.sub_category}</div>
                        <div class="test-options" style="margin-top: 20px;">${optionsHtml}</div>
                        <div id="test-feedback" style="margin-top: 24px; text-align: center; font-size: 16px;"></div>
                    </div>
                `;
            }).catch(err => {
                showError('加载失败，请检查网络连接');
            });
        }

        function selectOption(index) {
            if (answered) return;
            answered = true;

            const selectedOption = allOptions[index];
            const isCorrect = selectedOption.id === currentTestQuestion.id;

            // 发送答案到后端
            fetch('/api/test/answer', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    question_id: currentTestQuestion.id,
                    selected_id: selectedOption.id
                })
            }).then(r => r.json()).then(data => {
                // 显示反馈
                const options = document.querySelectorAll('.test-option');
                options.forEach(opt => {
                    const optId = parseInt(opt.dataset.id);
                    if (optId === currentTestQuestion.id) {
                        opt.style.background = '#d4edda';
                        opt.style.borderColor = '#28a745';
                    } else if (optId === selectedOption.id && !isCorrect) {
                        opt.style.background = '#f8d7da';
                        opt.style.borderColor = '#dc3545';
                    }
                    opt.style.cursor = 'default';
                });

                const feedback = document.getElementById('test-feedback');
                if (isCorrect) {
                    feedback.innerHTML = '<span style="color: #28a745; font-weight: 600;">✓ 回答正确！</span>';
                } else {
                    feedback.innerHTML = '<span style="color: #dc3545; font-weight: 600;">✗ 回答错误，正确答案是：' + currentTestQuestion.title + '</span>';
                }

                // 2秒后自动加载下一题
                setTimeout(loadTest, 2000);
            });
        }

        loadCategories();
    </script>
</body>
</html>
